<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Tracker</title>
<meta name="theme-color" content="#0e0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d38;
    --owe: #ff4d6d;
    --owed: #00c896;
    --accent: #7b5ea7;
    --upcoming: #f0b429;
    --text: #e8eaf0;
    --muted: #6b7080;
    --card-radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header { text-align: center; margin-bottom: 28px; }

  header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--owed), var(--accent), var(--owe));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; font-family: 'DM Mono', monospace; }

  .sync-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .sync-dot.synced { background: var(--owed); }
  .sync-dot.syncing { background: var(--upcoming); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--owe); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .tab-btn {
    padding: 9px 22px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active-main { background: rgba(123,94,167,0.15); border-color: var(--accent); color: var(--accent); }
  .tab-btn.active-upcoming { background: rgba(240,180,41,0.12); border-color: var(--upcoming); color: var(--upcoming); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--upcoming);
    color: var(--upcoming);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 10px 20px;
    border-radius: 50px;
    z-index: 200;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .summary-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .summary-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.owe { background: var(--owe); }
  .dot.owed { background: var(--owed); }
  .dot.upcoming { background: var(--upcoming); }

  .add-btn-wrap { display: flex; justify-content: center; margin-bottom: 28px; }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), #9b6bca);
    border: none;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 12px 32px;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(123,94,167,0.35);
  }

  .add-btn.upcoming-btn {
    background: linear-gradient(135deg, #b07d10, #f0b429);
    box-shadow: 0 4px 20px rgba(240,180,41,0.25);
  }

  .add-btn:hover { transform: translateY(-2px); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 28px;
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 72px; }
  .field select option { background: var(--surface2); }

  .toggle-row { display: flex; gap: 10px; margin-bottom: 16px; }

  .toggle-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.active-owe { border-color: var(--owe); background: rgba(255,77,109,0.1); color: var(--owe); }
  .toggle-btn.active-owed { border-color: var(--owed); background: rgba(0,200,150,0.1); color: var(--owed); }

  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }

  .btn-cancel {
    flex: 1; padding: 11px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'Syne', sans-serif;
    font-weight: 600; cursor: pointer;
  }

  .btn-save {
    flex: 2; padding: 11px; border-radius: 8px; border: none; background: var(--accent);
    color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: #9b6bca; }

  .controls-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    max-width: 900px;
    margin: 0 auto 20px;
    flex-wrap: wrap;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .controls-bar select, .controls-bar input[type=text] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 7px 12px;
    outline: none;
  }

  .controls-bar input[type=text] { width: 160px; }

  .btn-export {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 7px 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  @media (max-width: 600px) { .columns { grid-template-columns: 1fr; } }

  .column-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-weight: 700;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .column-header.owe { color: var(--owe); }
  .column-header.owed { color: var(--owed); }
  .column-header.upcol { color: var(--upcoming); }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 2px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .shift-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 12px;
    border-left: 3px solid transparent;
    transition: transform 0.15s;
  }

  .shift-card:hover { transform: translateY(-2px); }
  .shift-card.owe { border-left-color: var(--owe); }
  .shift-card.owed { border-left-color: var(--owed); }
  .shift-card.up-for-them { border-left-color: var(--owed); }
  .shift-card.up-for-me { border-left-color: var(--owe); }

  .card-person { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
  .card-shift { font-size: 0.88rem; color: var(--muted); margin-bottom: 6px; }
  .card-date { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }

  .days-away {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 50px;
    margin-left: 6px;
    background: rgba(240,180,41,0.12);
    color: var(--upcoming);
    border: 1px solid rgba(240,180,41,0.3);
  }

  .will-become {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
  }

  .card-notes {
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 6px;
  }

  .card-actions { display: flex; gap: 8px; margin-top: 10px; }

  .btn-paid {
    flex: 1; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--owed);
    background: rgba(0,200,150,0.08); color: var(--owed); font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: background 0.2s;
  }
  .btn-paid:hover { background: rgba(0,200,150,0.18); }

  .btn-delete {
    padding: 7px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 0.85rem; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-delete:hover { border-color: var(--owe); color: var(--owe); }

  .empty-state {
    text-align: center; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.82rem; padding: 32px 0; border: 1px dashed var(--border);
    border-radius: var(--card-radius);
  }

  .upcoming-info {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin: 0 auto 20px;
    max-width: 900px;
    padding: 10px 16px;
    background: rgba(240,180,41,0.06);
    border: 1px solid rgba(240,180,41,0.2);
    border-radius: 10px;
  }

  .history-section { max-width: 900px; margin: 32px auto 0; }
  .history-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 20px; }

  .history-toggle {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; padding: 10px 0; margin-bottom: 12px;
  }

  .history-toggle-label {
    font-weight: 700; font-size: 0.85rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .history-chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; }
  .history-chevron.open { transform: rotate(180deg); }

  .history-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .history-grid.open { max-height: 2000px; }

  .history-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--card-radius); padding: 14px; opacity: 0.75;
    border-left: 3px solid transparent;
  }
  .history-card.owe { border-left-color: var(--owe); }
  .history-card.owed { border-left-color: var(--owed); }

  .paid-tag { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--owed); margin: 8px 0; }

  .btn-restore {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.72rem; cursor: pointer; margin-right: 6px;
  }

  .btn-purge {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.72rem; cursor: pointer;
  }

  .clear-history-btn {
    display: block; margin: 16px auto 0; padding: 8px 20px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.78rem; cursor: pointer;
  }

  @media print {
    .add-btn-wrap, .controls-bar, .modal-overlay, .card-actions,
    .history-section, .sync-bar, .tabs { display: none !important; }
    body { background: #fff; color: #000; }
    .shift-card { border: 1px solid #ccc; page-break-inside: avoid; }
  }
</style>
</head>
<body>

<header>
  <h1>Shift Tracker</h1>
  <p>track shifts you owe &amp; shifts owed to you</p>
</header>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-label">Loading...</span>
</div>

<div class="tabs">
  <button class="tab-btn active-main" id="tab-main" onclick="switchTab('main')">⇄ Owe / Owed</button>
  <button class="tab-btn" id="tab-upcoming" onclick="switchTab('upcoming')">📅 Upcoming <span id="upcoming-tab-badge" style="display:none;background:rgba(240,180,41,0.2);color:var(--upcoming);border-radius:50px;padding:1px 7px;font-size:0.75rem;font-family:'DM Mono',monospace;margin-left:4px;"></span></button>
</div>

<!-- Main Tab -->
<div class="tab-panel active" id="panel-main">
  <div class="summary-bar">
    <div class="summary-pill"><div class="dot owe"></div><span id="owe-count">0 shifts</span></div>
    <div class="summary-pill"><div class="dot owed"></div><span id="owed-count">0 shifts</span></div>
  </div>
  <div class="add-btn-wrap">
    <button class="add-btn" onclick="openModal(null,'main')">+ Add Shift</button>
  </div>
  <div class="controls-bar">
    <label>Sort:</label>
    <select id="sort-select" onchange="render()">
      <option value="date-asc">Date (oldest first)</option>
      <option value="date-desc">Date (newest first)</option>
      <option value="name">Name (A–Z)</option>
    </select>
    <label>Filter:</label>
    <input type="text" id="filter-input" placeholder="Search person..." oninput="render()">
    <button class="btn-export" onclick="printList()">⎙ Print / Export</button>
  </div>
  <div class="columns">
    <div>
      <div class="column-header owe">⬆ I Owe <span class="badge" id="owe-badge">0</span></div>
      <div id="owe-list"></div>
    </div>
    <div>
      <div class="column-header owed">⬇ Owed to Me <span class="badge" id="owed-badge">0</span></div>
      <div id="owed-list"></div>
    </div>
  </div>
  <div class="history-section" id="history-section" style="display:none">
    <hr class="history-divider">
    <div class="history-toggle" onclick="toggleHistory()">
      <span class="history-toggle-label">✓ Paid Back History &nbsp;<span id="history-count-label"></span></span>
      <span class="history-chevron" id="history-chevron">▼</span>
    </div>
    <div class="history-grid" id="history-grid"></div>
    <button class="clear-history-btn" onclick="clearHistory()">🗑 Clear All History</button>
  </div>
</div>

<!-- Upcoming Tab -->
<div class="tab-panel" id="panel-upcoming">
  <div class="upcoming-info">When you open the app after a shift date has passed, it automatically moves to Owe / Owed.</div>
  <div class="summary-bar">
    <div class="summary-pill"><div class="dot upcoming"></div><span id="upcoming-count">0 upcoming</span></div>
  </div>
  <div class="add-btn-wrap">
    <button class="add-btn upcoming-btn" onclick="openModal(null,'upcoming')">+ Add Upcoming Shift</button>
  </div>
  <div class="columns">
    <div>
      <div class="column-header upcol">📅 I'm Doing For Them <span class="badge" id="badge-for-them">0</span></div>
      <div id="list-for-them"></div>
    </div>
    <div>
      <div class="column-header upcol">📅 They're Doing For Me <span class="badge" id="badge-for-me">0</span></div>
      <div id="list-for-me"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add Shift</h2>
    <div class="toggle-row" id="toggle-main">
      <button class="toggle-btn active-owe" id="btn-owe" onclick="setType('owe')">I Owe Them</button>
      <button class="toggle-btn" id="btn-owed" onclick="setType('owed')">They Owe Me</button>
    </div>
    <div class="toggle-row" id="toggle-upcoming" style="display:none">
      <button class="toggle-btn active-owed" id="btn-for-them" onclick="setUpType('for-them')">I'm Doing It</button>
      <button class="toggle-btn" id="btn-for-me" onclick="setUpType('for-me')">They're Doing It</button>
    </div>
    <div class="field">
      <label>Person's Name</label>
      <input type="text" id="input-name" placeholder="e.g. Sarah, Jake...">
    </div>
    <div class="field">
      <label>Shift Description</label>
      <input type="text" id="input-shift" placeholder="e.g. Friday night, Day shift...">
    </div>
    <div class="field">
      <label>Date of Shift</label>
      <input type="date" id="input-date">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="input-notes" placeholder="Any extra details..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveShift()">Save Shift</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let shifts = [];
  let upcoming = [];
  let history = [];
  let currentType = 'owe';
  let currentUpType = 'for-them';
  let editId = null;
  let editCtx = 'main';
  let historyOpen = false;
  let syncTimeout = null;

  function setSyncStatus(status, text) {
    document.getElementById('sync-dot').className = 'sync-dot ' + status;
    document.getElementById('sync-label').textContent = text;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  async function loadFromCloud() {
    setSyncStatus('syncing', 'Syncing...');
    try {
      const s = await window.storage.get('shifts');
      const u = await window.storage.get('upcoming');
      const h = await window.storage.get('history');
      shifts   = s ? JSON.parse(s.value) : [];
      upcoming = u ? JSON.parse(u.value) : [];
      history  = h ? JSON.parse(h.value) : [];
      setSyncStatus('synced', 'Synced across devices');
    } catch(e) {
      shifts = []; upcoming = []; history = [];
      setSyncStatus('synced', 'Ready');
    }
    promoteUpcoming();
    render();
  }

  async function saveToCloud() {
    setSyncStatus('syncing', 'Saving...');
    try {
      await window.storage.set('shifts',   JSON.stringify(shifts));
      await window.storage.set('upcoming', JSON.stringify(upcoming));
      await window.storage.set('history',  JSON.stringify(history));
      setSyncStatus('synced', 'Saved & synced');
    } catch(e) {
      setSyncStatus('error', 'Sync failed – check connection');
    }
  }

  function save() {
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(saveToCloud, 400);
  }

  function promoteUpcoming() {
    const today = new Date().toISOString().split('T')[0];
    const due = upcoming.filter(u => u.date < today);
    if (!due.length) return;
    due.forEach(u => {
      // I'm doing it for them → after date → they owe me (owed)
      // They're doing it for me → after date → I owe them (owe)
      const type = u.upType === 'for-them' ? 'owed' : 'owe';
      shifts.push({ id: Date.now() + Math.random(), name: u.name, shift: u.shift, date: u.date, notes: u.notes, type });
    });
    upcoming = upcoming.filter(u => u.date >= today);
    save();
    showToast(due.length + ' upcoming shift' + (due.length > 1 ? 's' : '') + ' moved to Owe / Owed');
  }

  function switchTab(tab) {
    document.getElementById('panel-main').classList.toggle('active', tab === 'main');
    document.getElementById('panel-upcoming').classList.toggle('active', tab === 'upcoming');
    document.getElementById('tab-main').className = 'tab-btn' + (tab === 'main' ? ' active-main' : '');
    document.getElementById('tab-upcoming').className = 'tab-btn' + (tab === 'upcoming' ? ' active-upcoming' : '');
  }

  function openModal(id, ctx) {
    editId = id; editCtx = ctx;
    const isUp = ctx === 'upcoming';
    document.getElementById('toggle-main').style.display = isUp ? 'none' : 'flex';
    document.getElementById('toggle-upcoming').style.display = isUp ? 'flex' : 'none';

    if (id !== null) {
      const list = isUp ? upcoming : shifts;
      const s = list.find(x => x.id == id);
      document.getElementById('modal-title').textContent = 'Edit Shift';
      document.getElementById('input-name').value  = s.name;
      document.getElementById('input-shift').value = s.shift;
      document.getElementById('input-date').value  = s.date;
      document.getElementById('input-notes').value = s.notes || '';
      if (isUp) setUpType(s.upType || 'for-them'); else setType(s.type);
    } else {
      document.getElementById('modal-title').textContent = isUp ? 'Add Upcoming Shift' : 'Add Shift';
      document.getElementById('input-name').value  = '';
      document.getElementById('input-shift').value = '';
      document.getElementById('input-date').value  = '';
      document.getElementById('input-notes').value = '';
      if (isUp) setUpType('for-them'); else setType('owe');
    }
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editId = null;
  }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-owe').className  = 'toggle-btn' + (t === 'owe'  ? ' active-owe'  : '');
    document.getElementById('btn-owed').className = 'toggle-btn' + (t === 'owed' ? ' active-owed' : '');
  }

  function setUpType(t) {
    currentUpType = t;
    document.getElementById('btn-for-them').className = 'toggle-btn' + (t === 'for-them' ? ' active-owed' : '');
    document.getElementById('btn-for-me').className   = 'toggle-btn' + (t === 'for-me'   ? ' active-owe'  : '');
  }

  function saveShift() {
    const name  = document.getElementById('input-name').value.trim();
    const shift = document.getElementById('input-shift').value.trim();
    const date  = document.getElementById('input-date').value;
    const notes = document.getElementById('input-notes').value.trim();
    if (!name || !shift || !date) { alert('Please fill in Name, Shift, and Date.'); return; }

    if (editCtx === 'upcoming') {
      const entry = { id: editId !== null ? editId : Date.now() + Math.random(), name, shift, date, notes, upType: currentUpType };
      if (editId !== null) { const i = upcoming.findIndex(x => x.id == editId); upcoming[i] = entry; }
      else upcoming.push(entry);
    } else {
      if (editId !== null) {
        const i = shifts.findIndex(x => x.id == editId);
        shifts[i] = { ...shifts[i], name, shift, date, notes, type: currentType };
      } else {
        shifts.push({ id: Date.now(), name, shift, date, notes, type: currentType });
      }
    }
    save(); render(); closeModal();
  }

  function deleteUpcoming(id) {
    if (confirm('Delete this upcoming shift?')) { upcoming = upcoming.filter(x => x.id != id); save(); render(); }
  }

  function markPaidBack(id) {
    const s = shifts.find(x => x.id == id); if (!s) return;
    history.unshift({ ...s, paidDate: new Date().toISOString().split('T')[0] });
    shifts = shifts.filter(x => x.id != id);
    save(); render();
  }

  function restoreShift(id) {
    const s = history.find(x => x.id == id); if (!s) return;
    const { paidDate, ...orig } = s;
    shifts.push({ ...orig, id: Date.now() });
    history = history.filter(x => x.id != id);
    save(); render();
  }

  function purgeHistory(id)  { history = history.filter(x => x.id != id); save(); render(); }

  function clearHistory() {
    if (confirm('Permanently delete all history?')) { history = []; save(); render(); }
  }

  function toggleHistory() {
    historyOpen = !historyOpen;
    document.getElementById('history-grid').className    = 'history-grid' + (historyOpen ? ' open' : '');
    document.getElementById('history-chevron').className = 'history-chevron' + (historyOpen ? ' open' : '');
  }

  function deleteShift(id) {
    if (confirm('Delete this entry?')) { shifts = shifts.filter(x => x.id != id); save(); render(); }
  }

  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;
  }

  function daysUntil(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((target - today) / 86400000);
    if (diff === 0) return 'today';
    if (diff === 1) return 'tomorrow';
    return 'in ' + diff + ' days';
  }

  function printList() { window.print(); }

  function getSorted() {
    const sort = document.getElementById('sort-select').value;
    const filter = document.getElementById('filter-input').value.trim().toLowerCase();
    let copy = [...shifts];
    if (filter) copy = copy.filter(s => s.name.toLowerCase().includes(filter));
    if (sort === 'date-asc')  copy.sort((a,b) => a.date.localeCompare(b.date));
    if (sort === 'date-desc') copy.sort((a,b) => b.date.localeCompare(a.date));
    if (sort === 'name')      copy.sort((a,b) => a.name.localeCompare(b.name));
    return copy;
  }

  function render() {
    const sorted = getSorted();
    const owe  = sorted.filter(s => s.type === 'owe');
    const owed = sorted.filter(s => s.type === 'owed');

    document.getElementById('owe-count').textContent  = owe.length  + ' shift' + (owe.length  !== 1 ? 's' : '');
    document.getElementById('owed-count').textContent = owed.length + ' shift' + (owed.length !== 1 ? 's' : '');
    document.getElementById('owe-badge').textContent  = owe.length;
    document.getElementById('owed-badge').textContent = owed.length;
    document.getElementById('owe-list').innerHTML  = owe.length  ? owe.map(cardHTML).join('')  : emptyState();
    document.getElementById('owed-list').innerHTML = owed.length ? owed.map(cardHTML).join('') : emptyState();

    const histSec = document.getElementById('history-section');
    if (history.length > 0) {
      histSec.style.display = 'block';
      document.getElementById('history-count-label').textContent = '(' + history.length + ')';
      document.getElementById('history-grid').innerHTML = history.map(histCardHTML).join('');
    } else { histSec.style.display = 'none'; }

    const upSorted = [...upcoming].sort((a,b) => a.date.localeCompare(b.date));
    const forThem  = upSorted.filter(u => u.upType === 'for-them');
    const forMe    = upSorted.filter(u => u.upType === 'for-me');

    document.getElementById('upcoming-count').textContent  = upcoming.length + ' upcoming';
    document.getElementById('badge-for-them').textContent  = forThem.length;
    document.getElementById('badge-for-me').textContent    = forMe.length;
    document.getElementById('list-for-them').innerHTML     = forThem.length ? forThem.map(upCardHTML).join('') : emptyState();
    document.getElementById('list-for-me').innerHTML       = forMe.length   ? forMe.map(upCardHTML).join('')   : emptyState();

    const badge = document.getElementById('upcoming-tab-badge');
    if (upcoming.length > 0) { badge.style.display = 'inline'; badge.textContent = upcoming.length; }
    else badge.style.display = 'none';
  }

  function emptyState() {
    return '<div class="empty-state">No entries yet</div>';
  }

  function cardHTML(s) {
    return '<div class="shift-card ' + s.type + '">' +
      '<div class="card-person">' + s.name + '</div>' +
      '<div class="card-shift">' + s.shift + '</div>' +
      '<div class="card-date">📅 ' + formatDate(s.date) + '</div>' +
      (s.notes ? '<div class="card-notes">"' + s.notes + '"</div>' : '') +
      '<div class="card-actions">' +
        '<button class="btn-paid" onclick="markPaidBack(' + s.id + ')">✓ Paid Back</button>' +
        '<button class="btn-delete" onclick="openModal(' + s.id + ',\'main\')">✎</button>' +
        '<button class="btn-delete" onclick="deleteShift(' + s.id + ')">✕</button>' +
      '</div></div>';
  }

  function upCardHTML(u) {
    const willBecome = u.upType === 'for-them'
      ? 'After this date → <span style="color:var(--owed)">Owed to Me</span>'
      : 'After this date → <span style="color:var(--owe)">I Owe Them</span>';
    return '<div class="shift-card ' + (u.upType === 'for-them' ? 'up-for-them' : 'up-for-me') + '">' +
      '<div class="card-person">' + u.name + '</div>' +
      '<div class="card-shift">' + u.shift + '</div>' +
      '<div class="card-date">📅 ' + formatDate(u.date) + ' <span class="days-away">' + daysUntil(u.date) + '</span></div>' +
      '<div class="will-become">' + willBecome + '</div>' +
      (u.notes ? '<div class="card-notes">"' + u.notes + '"</div>' : '') +
      '<div class="card-actions">' +
        '<button class="btn-delete" onclick="openModal(\'' + u.id + '\',\'upcoming\')" style="flex:1">✎ Edit</button>' +
        '<button class="btn-delete" onclick="deleteUpcoming(\'' + u.id + '\')">✕</button>' +
      '</div></div>';
  }

  function histCardHTML(s) {
    const lbl = s.type === 'owe' ? 'I owed them' : 'They owed me';
    return '<div class="history-card ' + s.type + '">' +
      '<div class="card-person">' + s.name + '</div>' +
      '<div class="card-shift">' + s.shift + '</div>' +
      '<div class="card-date">📅 ' + formatDate(s.date) + '</div>' +
      (s.notes ? '<div class="card-notes">"' + s.notes + '"</div>' : '') +
      '<div class="paid-tag">✓ Paid back ' + formatDate(s.paidDate) + ' · ' + lbl + '</div>' +
      '<div><button class="btn-restore" onclick="restoreShift(' + s.id + ')">↩ Restore</button>' +
      '<button class="btn-purge" onclick="purgeHistory(' + s.id + ')">✕ Remove</button></div>' +
      '</div>';
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  loadFromCloud();
</script>
</body>
</html>
